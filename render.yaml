services:
  - type: web
    name: hairstyle-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false          # Set manually in Render dashboard
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: UPLOAD_FOLDER
        value: static/uploads
      - key: MAX_CONTENT_LENGTH
        value: "16777216"
      - key: DEBUG
        value: "False"
